<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>播放设置 - 跳过片头片尾</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Noto+Sans+SC:wght@400;500;700&display=swap');

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .mono-font {
            font-family: 'JetBrains Mono', monospace;
        }

        /* 自定义滑块样式 */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        /* 轨道样式 Chrome */
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        /* 滑块手柄 Chrome */
        input[type=range]::-webkit-slider-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.3);
            background: #ffcc00;
        }

        /* 磨砂玻璃效果 */
        .glass-panel {
            background: linear-gradient(145deg, #222222, #181818);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .active-blue {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active-blue:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
            color: #ffffff;
            transform: translateY(-1px);
        }

        .active-blue:active {
            transform: scale(0.96);
            background: rgba(59, 130, 246, 0.3);
        }

        /* 吐司弹窗动画 */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast {
            animation: slideUp 0.3s ease-out;
        }
    </style>

<body class="">
<!-- 模拟手机/播放器容器 -->
<div class="w-[375px] h-[520px] glass-panel rounded-[32px] overflow-hidden flex flex-col p-6 relative">
<!-- 顶部标题区 -->
<div class="flex justify-between items-start mb-8">
<div>
<h1 class="text-xl font-bold tracking-tight text-white mb-1">跳过片头/片尾</h1>
<p class="text-xs text-gray-500 flex items-center gap-1">
<svg aria-hidden="true" class="iconify iconify--mdi" data-icon="mdi:movie-open-outline" height="1em" role="img" viewbox="0 0 24 24" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="m20.84 2.18l-3.93.78l2.74 3.54l1.97-.4zm-6.87 1.36L12 3.93l2.75 3.53l1.96-.39zm-4.9.96l-1.97.41l2.75 3.53l1.96-.39zm-4.91 1l-.98.19a1.995 1.995 0 0 0-1.57 2.35L2 10l4.9-.97zM20 12v8H4v-8zm2-2H2v10a2 2 0 0 0 2 2h16c1.11 0 2-.89 2-2z" fill="currentColor"></path></svg>
                    生效范围：好好的时光</p>
</div>
<button class="flex items-center gap-1 px-3 py-1.5 bg-white/5 hover:bg-white/10 active:scale-95 transition-all rounded-full text-xs font-medium text-gray-300" onclick="resetValues()">
<svg aria-hidden="true" class="iconify iconify--mdi" data-icon="mdi:refresh" height="1em" role="img" viewbox="0 0 24 24" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M17.65 6.35A7.96 7.96 0 0 0 12 4a8 8 0 0 0-8 8a8 8 0 0 0 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18a6 6 0 0 1-6-6a6 6 0 0 1 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4z" fill="currentColor"></path></svg>
                重置
            </button>
</div>
<!-- 片头设置区 -->
<div class="mb-10">
<div class="flex justify-between items-center mb-5">
<div class="flex flex-col">
<span class="text-xs text-gray-400 font-medium mb-1">片头时长</span>
<span class="text-3xl font-bold text-[#FFCC00] mono-font leading-none" id="opening-value">01:40</span>
</div>
<button class="active-blue" onclick="setAsCurrent('opening', this)"><svg aria-hidden="true" class="iconify iconify--mdi" data-icon="mdi:check" height="1em" role="img" viewbox="0 0 24 24" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M21 7L9 19l-5.5-5.5l1.41-1.41L9 16.17L19.59 5.59z" fill="currentColor"></path></svg><span>已同步</span></button>
</div>
<div class="relative px-1">
<input class="cursor-pointer" id="opening-slider" max="600" min="0" type="range" value="100"/>
<div class="flex justify-between mt-3 text-[10px] text-gray-500 font-medium">
<span>开始</span>
<span id="opening-marker">01:40</span>
</div>
</div>
</div>
<!-- 片尾设置区 -->
<div class="mb-10">
<div class="flex justify-between items-center mb-5">
<div class="flex flex-col">
<span class="text-xs text-gray-400 font-medium mb-1">片尾时长</span>
<span class="text-3xl font-bold text-[#FFCC00] mono-font leading-none" id="closing-value">02:10</span>
</div>
<button class="active-blue" onclick="setAsCurrent('closing', this)">
<svg aria-hidden="true" class="iconify text-base iconify--mdi" data-icon="mdi:clock-check-outline" height="1em" role="img" viewbox="0 0 24 24" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="m23.5 17l-5 5l-3.5-3.5l1.5-1.5l2 2l3.5-3.5zm-10.4 2.9c-.4.1-.7.1-1.1.1c-4.4 0-8-3.6-8-8s3.6-8 8-8s8 3.6 8 8c0 .4 0 .7-.1 1.1c.7.1 1.3.3 1.9.6c.1-.6.2-1.1.2-1.7c0-5.5-4.5-10-10-10S2 6.5 2 12s4.5 10 10 10c.6 0 1.2-.1 1.7-.2c-.3-.5-.5-1.2-.6-1.9m2.5-5.8l-3.1-1.8V7H11v6l3.5 2.1c.3-.4.7-.7 1.1-1" fill="currentColor"></path></svg>
<span>捕获当前</span>
</button>
</div>
<div class="relative px-1">
<input class="cursor-pointer" id="closing-slider" max="600" min="0" type="range" value="130"/>
<div class="flex justify-between mt-3 text-[10px] text-gray-500 font-medium">
<span>20:56</span>
<span class="px-2 py-0.5 bg-white/5 rounded">结束</span>
</div>
</div>
</div>
<!-- 底部保存按钮 -->
<div class="mt-auto pt-4">
<button class="w-full py-4 bg-white/10 hover:bg-white/20 active:scale-[0.98] transition-all rounded-2xl text-white font-bold text-sm tracking-widest uppercase" onclick="saveSettings()">保存设置</button>
</div>
<!-- 吐司提示 -->
<div class="absolute bottom-24 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-2.5 rounded-full text-xs font-bold shadow-2xl z-50 flex items-center gap-2 toast hidden" id="toast">
<svg aria-hidden="true" class="iconify text-green-600 iconify--mdi" data-icon="mdi:check-circle" height="1em" role="img" viewbox="0 0 24 24" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10s10-4.5 10-10S17.5 2 12 2m-2 15l-5-5l1.41-1.41L10 14.17l7.59-7.59L19 8z" fill="currentColor"></path></svg>设置已保存并同步</div>
</div>
<script>
        // 初始化数据
        const openingSlider = document.getElementById('opening-slider');
        const closingSlider = document.getElementById('closing-slider');
        const openingValText = document.getElementById('opening-value');
        const closingValText = document.getElementById('closing-value');
        const openingMarker = document.getElementById('opening-marker');

        // 秒转分秒格式 00:00
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // 核心更新逻辑
        function updateDisplay() {
            const opVal = openingSlider.value;
            const clVal = closingSlider.value;
            
            openingValText.innerText = formatTime(opVal);
            openingMarker.innerText = formatTime(opVal);
            closingValText.innerText = formatTime(clVal);
        }

        // 监听滑块
        openingSlider.addEventListener('input', updateDisplay);
        closingSlider.addEventListener('input', updateDisplay);

        // 重置功能
        function resetValues() {
            openingSlider.value = 100; // 01:40
            closingSlider.value = 130; // 02:10
            updateDisplay();
            showToast("配置已恢复默认值");
        }

        // 模拟设置当前时间
        function setAsCurrent(type, btn) {
            const randomTime = Math.floor(Math.random() * 300) + 30; // 模拟随机当前播放时间
            if(type === 'opening') {
                openingSlider.value = randomTime;
            } else {
                closingSlider.value = randomTime;
            }
            updateDisplay();
            showToast(`已捕获当前进度: ${formatTime(randomTime)}`);
            
            // 简单的按钮视觉成功反馈
            const originalContent = btn.innerHTML;
            btn.classList.add('bg-green-500/20', 'border-green-500/50', 'text-green-400');
            btn.innerHTML = `<span class="iconify" data-icon="mdi:check"></span><span>已同步</span>`;
            setTimeout(() => {
                btn.classList.remove('bg-green-500/20', 'border-green-500/50', 'text-green-400');
                btn.innerHTML = originalContent;
            }, 1000);
        }

        // 保存设置
        function saveSettings() {
            showToast("设置已保存并同步");
            // 简单的按钮视觉反馈
            const btn = event.currentTarget;
            btn.innerHTML = "正在保存...";
            setTimeout(() => {
                btn.innerHTML = "保存设置";
            }, 1000);
        }

        // 提示反馈
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.lastChild.textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 2500);
        }

        // 初始化执行
        updateDisplay();
    </script>
</body></html>
